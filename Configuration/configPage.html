<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Kavasaki Presence</title>
</head>
<body>
    <div id="kavasakiPresenceConfigurationPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form id="kavasakiPresenceConfigurationForm">
                    <div class="sectionTitle">Discord Settings</div>
                    
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="discordToken">Discord User Token</label>
                        <input id="discordToken" name="DiscordToken" type="password" is="emby-input" />
                        <div class="fieldDescription">Your Discord user token. Keep this private!</div>
                    </div>

                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input type="checkbox" is="emby-checkbox" id="isEnabled" name="IsEnabled" />
                            <span>Enable Plugin</span>
                        </label>
                    </div>

                    <div class="sectionTitle">Display Options</div>

                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input type="checkbox" is="emby-checkbox" id="showImdbRating" name="ShowImdbRating" />
                            <span>Show IMDB Rating</span>
                        </label>
                    </div>

                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input type="checkbox" is="emby-checkbox" id="showImdbButton" name="ShowImdbButton" />
                            <span>Show IMDB Button</span>
                        </label>
                    </div>

                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input type="checkbox" is="emby-checkbox" id="showTimestamp" name="ShowTimestamp" />
                            <span>Show Playback Timestamp</span>
                        </label>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="jellyfinPublicUrl">Jellyfin Public URL</label>
                        <input id="jellyfinPublicUrl" name="JellyfinPublicUrl" type="text" is="emby-input" />
                        <div class="fieldDescription">Optional: Public URL of your server for the "Watch on Jellyfin" button.</div>
                    </div>

                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script type="text/javascript">
            var KavasakiPresenceConfig = {
                pluginUniqueId: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
            };

            document.querySelector('#kavasakiPresenceConfigurationPage').addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();
                var page = this;
                ApiClient.getPluginConfiguration(KavasakiPresenceConfig.pluginUniqueId).then(function (config) {
                    page.querySelector('#discordToken').value = config.DiscordToken || '';
                    page.querySelector('#isEnabled').checked = config.IsEnabled;
                    page.querySelector('#showImdbRating').checked = config.ShowImdbRating;
                    page.querySelector('#showImdbButton').checked = config.ShowImdbButton;
                    page.querySelector('#showTimestamp').checked = config.ShowTimestamp;
                    page.querySelector('#jellyfinPublicUrl').value = config.JellyfinPublicUrl || '';
                    Dashboard.hideLoadingMsg();
                });
            });

            document.querySelector('#kavasakiPresenceConfigurationForm').addEventListener('submit', function (e) {
                Dashboard.showLoadingMsg();
                var form = this;
                ApiClient.getPluginConfiguration(KavasakiPresenceConfig.pluginUniqueId).then(function (config) {
                    config.DiscordToken = form.querySelector('#discordToken').value;
                    config.IsEnabled = form.querySelector('#isEnabled').checked;
                    config.ShowImdbRating = form.querySelector('#showImdbRating').checked;
                    config.ShowImdbButton = form.querySelector('#showImdbButton').checked;
                    config.ShowTimestamp = form.querySelector('#showTimestamp').checked;
                    config.JellyfinPublicUrl = form.querySelector('#jellyfinPublicUrl').value;

                    ApiClient.updatePluginConfiguration(KavasakiPresenceConfig.pluginUniqueId, config).then(function (result) {
                        Dashboard.processPluginConfigurationUpdateResult(result);
                    });
                });

                e.preventDefault();
                return false;
            });
        </script>
    </div>
</body>
</html>
